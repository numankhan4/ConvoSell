services:
  - type: web
    name: convosell-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WHATSAPP_CRM_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_WORKER_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WHATSAPP_API_URL
        value: https://graph.facebook.com/v18.0
      - key: LOG_LEVEL
        value: info

  - type: worker
    name: convosell-worker
    runtime: node
    rootDir: worker
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BACKEND_INTERNAL_URL
        sync: false
      - key: INTERNAL_WORKER_KEY
        sync: false
      - key: WHATSAPP_API_URL
        value: https://graph.facebook.com/v18.0
      - key: LOG_LEVEL
        value: info
