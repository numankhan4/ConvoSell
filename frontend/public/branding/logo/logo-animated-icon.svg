<!-- convosell-icon-animated-pulse.svg -->
<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- SOFT GLOW -->
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Pulse Aura */
    .pulse {
      fill: #4338CA;
      opacity: 0.12;
      transform-origin: center;
      animation: pulse 2s ease-out infinite;
    }

    /* Main bubble */
    .bubble {
      fill: #4338CA;
      opacity: 0;
      animation: fadeIn 0.35s ease-out forwards;
    }

    /* Arrow */
    .arrow {
      stroke: white;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;

      stroke-dasharray: 60;
      stroke-dashoffset: 60;

      animation: draw 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
    }

    /* Arrow head */
    .arrow-head {
      fill: white;
      opacity: 0;
      transform-origin: center;
      animation: pop 0.25s ease-out 0.9s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pop {
      0% { transform: scale(0.85); opacity: 0; }
      70% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 🔥 KEY: subtle breathing pulse */
    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.12;
      }
      60% {
        transform: scale(1.12);
        opacity: 0;
      }
      100% {
        transform: scale(1.12);
        opacity: 0;
      }
    }
  </style>

  <!-- Pulse Layer (behind) -->
  <path class="pulse"
    d="M14 22
       C14 14 22 10 30 10
       H50
       C60 10 66 14 66 22
       V42
       C66 50 60 54 50 54
       H40
       C38 54 36 55.5 34 58
       L30 64
       L30 54
       H30
       C22 54 14 50 14 42
       Z"/>

  <!-- Main Bubble -->
  <path class="bubble"
    d="M14 22
       C14 14 22 10 30 10
       H50
       C60 10 66 14 66 22
       V42
       C66 50 60 54 50 54
       H40
       C38 54 36 55.5 34 58
       L30 64
       L30 54
       H30
       C22 54 14 50 14 42
       Z"/>

  <!-- Arrow -->
  <path class="arrow"
    d="M24 40 L34 30 L42 35 L52 24"/>

  <!-- Arrow Head -->
  <path class="arrow-head"
    d="M52 24 L49 29 L58 26 Z"/>

</svg>